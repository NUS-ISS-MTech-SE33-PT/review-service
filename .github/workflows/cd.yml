name: CD

on:
  push:
    tags:
    - '*-verified'

permissions:
  contents: write
  id-token: write

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Extract SHA from tag
        id: resolve
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" != *-verified ]]; then
            echo "ERROR: input must be a *-verified tag."
            exit 1
          fi
          echo "sha=${TAG%-verified}" >> "$GITHUB_OUTPUT"

      - name: Checkout at target SHA
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          ref: ${{ steps.resolve.outputs.sha }}
          fetch-depth: 0

      - name: Verify SHA is on main branch
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${{ steps.resolve.outputs.sha }}" origin/main; then
            echo "ERROR: ${{ steps.resolve.outputs.sha }} is not on the main branch."
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37
        with:
          role-to-assume: arn:aws:iam::921142537307:role/github-actions-review-service-prod-role
          aws-region: ap-southeast-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@376925c9d111252e87ae59691e5a442dd100ef6a

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: makango-review-service
          SHA: ${{ steps.resolve.outputs.sha }}
        run: |
          docker build \
            -t "$REGISTRY/$REPOSITORY:$SHA" \
            -t "$REGISTRY/$REPOSITORY:latest" \
            ./review-service
          docker push "$REGISTRY/$REPOSITORY:$SHA"
          docker push "$REGISTRY/$REPOSITORY:latest"

      - name: Deploy to ECS
        run: |
          STATUS=$(aws ecs describe-services \
            --cluster prod-cluster \
            --services review-service \
            --query 'services[0].status' \
            --output text 2>/dev/null || echo "MISSING")

          if [ "$STATUS" = "ACTIVE" ]; then
            echo "ECS service is active — triggering forced redeployment..."
            aws ecs update-service \
              --cluster prod-cluster \
              --service review-service \
              --force-new-deployment \
              --region ap-southeast-1
          else
            echo "ECS service not active (status: $STATUS). Image pushed to ECR; skipping ECS update."
          fi

      - name: Move prod tag to this commit
        run: |
          git tag -f prod "${{ steps.resolve.outputs.sha }}"
          git push origin -f prod
